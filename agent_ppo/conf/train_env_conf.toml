# ObstacleHover Training Environment Configuration
# ObstacleHover 训练环境配置

[env_conf]
num_envs = 2048

[env_conf.task_obstaclehover]
num_obstacles_range = [2, 5]
radius_choices = [0.15, 0.20, 0.25, 0.30, 0.35]
nav_max_steps = 1500
hover_max_steps = 150
max_collisions = 5
num_waypoints_range = [0, 5]

# =====================================================================
# Reward Shaping Configuration
# 奖励塑形配置
# =====================================================================

[rewards.target_progress]
weight = 1.0

[rewards.goal_reached]
weight = 1.0

[rewards.in_arena]
weight = 1.0

[rewards.waypoint_collected]
weight = 1.0

[rewards.waypoint_guide]
weight = 1.0

[rewards.altitude_maintenance]
# 【新增关键】高度保命，防止撞地自杀
weight = 1.0

[rewards.target_proximity]
# 【修正】终点门外微吸力，引导进门但不扣血
weight = 1.0

# 【必须删除】导致持续流血和自杀的毒药
# [rewards.waypoint_proximity_penalty]
# weight = 1.0
# [rewards.target_proximity_penalty]
# weight = 1.0

[rewards.obstacle_penalty]
weight = 1.0

[rewards.approach_damping]
weight = 1.0

[rewards.hover_stability]
weight = 1.0

[rewards.smoothness]
weight = 1.0
